{% extends "base.html" %}

{% block title %}Pay with Razorpay/UPI | Tapai Ko Sathi{% endblock %}

{% block content %}
<div class="container tks-page-section" style="max-width: 600px; margin: 2rem auto; text-align: center;">
    <h1>Confirm Payment</h1>
    <p>Complete your payment using Razorpay (Cards, Netbanking, or UPI).</p>

    <div class="tks-card" style="padding: 2rem; margin-top: 1rem;">
        <h3>Order Total: NPR {{ order.total_amount }}</h3>
        <p class="text-muted">Transaction ID: {{ razorpay_order_id }}</p>

        <button id="rzp-button1" class="tks-btn-primary" style="margin-top: 1rem;">Pay Now</button>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ amount_paise }}",
        "currency": "INR", // Razorpay standard
        "name": "Tapai Ko Sathi",
        "description": "Payment for Order {{ order.order_number }}",
        "order_id": "{{ razorpay_order_id }}",
        "callback_url": "{{ callback_url }}",
        "prefill": {
            "name": "{{ order.full_name }}",
            "email": "{{ request.user.email }}",
            "contact": "{{ order.phone }}"
        },
        "theme": {
            "color": "#6D28D9"
        }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function (e) {
        rzp1.open();
        e.preventDefault();
    }
    // Automatically open on load for smoother UX
    window.onload = function () {
        rzp1.open();
    };
</script>
{% endblock %}
