{% extends "base.html" %}
{% block title %}Confirm delete | Admin | Tapai Ko Sathi{% endblock %}
{% block content %}
<section class="tks-section">
    <h1>Confirm delete</h1>
    <p>Are you sure you want to delete this {{ type }}: <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="tks-btn-primary">Yes, delete</button>
    </form>
</section>
{% endblock %}
