{% extends "base.html" %}

{% block title %}Page Not Found - Tapai Ko Sathi{% endblock %}

{% block content %}
<div
    style="min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
    <h1 style="font-size: 4rem; font-weight: 800; color: var(--accent); margin-bottom: 1rem;">404</h1>
    <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Oops! Page not found.</h2>
    <p style="color: var(--text-muted); max-width: 400px; margin-bottom: 2rem;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="{% url 'home' %}" class="tks-btn-add-cart" style="text-decoration: none; padding: 0.8rem 2rem;">Back to
        Home</a>
</div>
{% endblock %}
