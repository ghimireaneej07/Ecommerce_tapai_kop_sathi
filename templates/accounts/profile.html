{% extends "base.html" %}
{% block title %}Profile | Tapai Ko Sathi{% endblock %}
{% block content %}
<section class="tks-auth-card">
    <h1>Your profile</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div class="tks-form-grid">
            {% for field in form %}
                <div class="tks-form-field">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="tks-field-error">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="tks-btn-primary">Save changes</button>
    </form>
</section>
{% endblock %}
